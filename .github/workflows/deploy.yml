name: Build and Deploy Astro Site

on:
  push:
    branches:
      - main # Or your main branch name (e.g., main, master)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x' # Or your preferred Node.js version. Using a more recent LTS version.

      - name: Install dependencies
        run: npm install # Or use 'yarn install' or 'pnpm install' if you use those

      - name: Build Astro site
        run: npm run build # This command usually runs your Astro build script defined in package.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # The output folder from your Astro build (usually 'dist')

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write      # to deploy to Pages
      id-token: write  # to verify the deployment originates from an appropriate source

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        # No 'with' section needed here as it automatically uses the artifact from the 'upload-pages-artifact' step
